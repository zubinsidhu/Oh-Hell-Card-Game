<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Oh Hell – Card Game</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap');

  :root {
    --felt:      #1a4a2e;
    --felt-dark: #0f2d1a;
    --felt-lite: #245c38;
    --gold:      #c9a84c;
    --gold-lite: #e8c96a;
    --cream:     #f5f0e8;
    --red:       #c0392b;
    --black:     #1a1a1a;
    --card-w:    72px;
    --card-h:    100px;
    --radius:    8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--felt-dark);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOBBY ── */
  #lobby-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 0;
    background: radial-gradient(ellipse at 50% 30%, #245c38 0%, #0f2d1a 70%);
    padding: 20px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 4px 32px rgba(201,168,76,.4), 0 2px 0 #8a6c28;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .logo-sub {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: rgba(245,240,232,.6);
    font-size: 1.1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }
  .card-panel {
    background: rgba(10,30,18,.7);
    border: 1px solid rgba(201,168,76,.25);
    border-radius: 16px;
    padding: 36px 40px;
    width: min(420px, 95vw);
    backdrop-filter: blur(8px);
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .card-panel h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(201,168,76,.2);
    padding-bottom: 12px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: .85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(245,240,232,.5);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(201,168,76,.3);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--gold); }
  .field input::placeholder { color: rgba(245,240,232,.3); }
  .btn {
    display: block; width: 100%;
    padding: 13px;
    border: none; border-radius: 8px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem; font-weight: 700;
    cursor: pointer;
    transition: all .18s;
    letter-spacing: .5px;
    margin-top: 8px;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #a8882e);
    color: #1a1a1a;
    box-shadow: 0 4px 16px rgba(201,168,76,.3);
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,.4); }
  .btn-outline {
    background: transparent;
    border: 1px solid rgba(201,168,76,.4);
    color: var(--gold);
  }
  .btn-outline:hover { background: rgba(201,168,76,.1); }
  .btn-sm { padding: 8px 16px; width: auto; display: inline-block; font-size: .85rem; }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
  .divider {
    text-align: center; color: rgba(245,240,232,.3);
    font-size: .8rem; margin: 18px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%;
    width: 40%; height: 1px;
    background: rgba(201,168,76,.2);
  }
  .divider::before { left: 0; }
  .divider::after  { right: 0; }
  .error { color: #e74c3c; font-size: .88rem; margin-top: 8px; }
  .code-display {
    background: rgba(201,168,76,.12);
    border: 1px dashed rgba(201,168,76,.4);
    border-radius: 8px;
    text-align: center;
    padding: 14px;
    margin: 16px 0;
  }
  .code-display .room-code {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    color: var(--gold);
    letter-spacing: 8px;
  }
  .code-display p { font-size: .8rem; color: rgba(245,240,232,.5); margin-top: 4px; }

  /* ── WAITING ROOM ── */
  .player-list { list-style: none; margin: 14px 0; }
  .player-list li {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 6px;
    background: rgba(255,255,255,.05);
    margin-bottom: 6px;
    font-size: .95rem;
  }
  .player-list li .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #27ae60; flex-shrink: 0;
  }
  .player-list li .host-badge {
    margin-left: auto; font-size: .7rem;
    background: rgba(201,168,76,.2); color: var(--gold);
    padding: 2px 7px; border-radius: 10px;
    letter-spacing: .5px;
  }

  /* ── GAME SCREEN ── */
  #game-screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 40%, #1e5e35 0%, var(--felt-dark) 80%);
  }

  /* Top bar */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px;
    background: rgba(0,0,0,.35);
    border-bottom: 1px solid rgba(201,168,76,.15);
    gap: 12px;
    flex-wrap: wrap;
  }
  .top-bar .game-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .round-info {
    font-size: .85rem;
    color: rgba(245,240,232,.7);
    text-align: center;
  }
  .round-info strong { color: var(--gold); }

  /* Trump display */
  .trump-display {
    display: flex; align-items: center; gap: 8px;
    font-size: .9rem;
  }
  .trump-display .trump-label {
    color: rgba(245,240,232,.5);
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Main play area */
  .play-area {
    flex: 1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 12px;
    gap: 12px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  /* Opponents row */
  .opponents-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  .opponent-area {
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(201,168,76,.1);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 120px;
    text-align: center;
    position: relative;
    transition: border-color .3s;
  }
  .opponent-area.active-player { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,.3); }
  .opponent-area .opp-name {
    font-family: 'Playfair Display', serif;
    font-size: .95rem;
    color: var(--cream);
    margin-bottom: 6px;
  }
  .opp-stats { display: flex; gap: 12px; justify-content: center; font-size: .8rem; color: rgba(245,240,232,.6); }
  .opp-stats span { display: flex; flex-direction: column; align-items: center; }
  .opp-stats .label { font-size: .65rem; text-transform: uppercase; letter-spacing: .5px; opacity: .6; }
  .opp-stats .val { font-size: 1rem; color: var(--cream); font-weight: 600; }
  .opp-cards {
    display: flex; justify-content: center; gap: -6px;
    margin-top: 8px;
  }
  .mini-card {
    width: 22px; height: 32px;
    background: linear-gradient(135deg, #f8f4ec, #e8e0d0);
    border: 1px solid rgba(0,0,0,.2);
    border-radius: 3px;
    margin-left: -8px;
    box-shadow: 1px 1px 3px rgba(0,0,0,.3);
  }
  .mini-card:first-child { margin-left: 0; }

  /* Center trick area */
  .trick-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    min-height: 130px;
  }
  .trick-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .trick-slot .trick-player-name {
    font-size: .7rem;
    color: rgba(245,240,232,.5);
    text-align: center;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Cards */
  .card {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: var(--radius);
    background: linear-gradient(145deg, #ffffff, #f0ebe0);
    border: 1px solid rgba(0,0,0,.15);
    box-shadow: 2px 3px 8px rgba(0,0,0,.35);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform .18s, box-shadow .18s;
    user-select: none;
    flex-shrink: 0;
  }
  .card:hover:not(.disabled):not(.static) { transform: translateY(-10px); box-shadow: 4px 8px 20px rgba(0,0,0,.4); }
  .card.disabled { opacity: .55; cursor: not-allowed; }
  .card.static { cursor: default; }
  .card.playable { box-shadow: 2px 3px 8px rgba(0,0,0,.35), 0 0 0 2px var(--gold); }
  .card-rank {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 900;
    line-height: 1;
  }
  .card-suit {
    font-size: 1.5rem;
    line-height: 1;
  }
  .card.red .card-rank, .card.red .card-suit { color: var(--red); }
  .card.black .card-rank, .card.black .card-suit { color: var(--black); }
  .card-corner {
    position: absolute;
    top: 4px; left: 6px;
    font-size: .7rem;
    font-weight: 700;
    line-height: 1.1;
  }
  .card-corner-br {
    position: absolute;
    bottom: 4px; right: 6px;
    font-size: .7rem;
    font-weight: 700;
    line-height: 1.1;
    transform: rotate(180deg);
  }

  /* Player's hand */
  .my-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .my-info {
    display: flex;
    align-items: center;
    gap: 18px;
    background: rgba(0,0,0,.3);
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: .9rem;
  }
  .my-info .my-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--gold);
  }
  .my-stat { display: flex; flex-direction: column; align-items: center; }
  .my-stat .stat-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .5px; opacity: .5; }
  .my-stat .stat-val { font-size: 1.1rem; font-weight: 600; }
  .hand {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .hand .card { transition: transform .18s, box-shadow .18s, opacity .18s; }

  /* Bidding UI */
  .bid-panel {
    background: rgba(0,0,0,.5);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 18px 24px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    max-width: 400px;
    margin: 0 auto;
  }
  .bid-panel h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .bid-panel p { color: rgba(245,240,232,.6); font-size: .85rem; margin-bottom: 16px; }
  .bid-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .bid-btn {
    width: 44px; height: 44px;
    border-radius: 8px;
    border: 1px solid rgba(201,168,76,.4);
    background: rgba(201,168,76,.1);
    color: var(--cream);
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
  }
  .bid-btn:hover:not(:disabled) { background: rgba(201,168,76,.3); border-color: var(--gold); transform: scale(1.08); }
  .bid-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* Scoreboard */
  .scoreboard {
    position: fixed;
    top: 0; right: 0;
    width: min(260px, 90vw);
    height: 100%;
    background: rgba(10,25,16,.95);
    border-left: 1px solid rgba(201,168,76,.2);
    padding: 16px;
    transform: translateX(100%);
    transition: transform .3s ease;
    z-index: 100;
    overflow-y: auto;
  }
  .scoreboard.open { transform: translateX(0); }
  .scoreboard h3 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    margin-bottom: 14px;
    font-size: 1.1rem;
  }
  .score-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  .score-table th {
    color: rgba(245,240,232,.4);
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: left;
    padding: 6px 4px;
    border-bottom: 1px solid rgba(201,168,76,.15);
  }
  .score-table td { padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,.05); }
  .score-table tr:first-child td { color: var(--gold); font-weight: 600; }
  .score-toggle {
    position: fixed;
    top: 60px; right: 12px;
    background: rgba(201,168,76,.15);
    border: 1px solid rgba(201,168,76,.3);
    color: var(--gold);
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: .75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 101;
    transition: background .2s;
  }
  .score-toggle:hover { background: rgba(201,168,76,.25); }

  /* Round end overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .overlay-card {
    background: linear-gradient(160deg, #0f3520, #0a2014);
    border: 1px solid var(--gold);
    border-radius: 20px;
    padding: 36px 44px;
    max-width: 480px;
    width: 90%;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  .overlay-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--gold);
    margin-bottom: 20px;
  }
  .round-results { list-style: none; margin: 16px 0 24px; text-align: left; }
  .round-results li {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: .95rem;
  }
  .round-results li.made { background: rgba(39,174,96,.15); }
  .round-results li.missed { background: rgba(192,57,43,.12); }
  .round-results li .delta { font-weight: 700; }
  .round-results li.made .delta { color: #2ecc71; }
  .round-results li.missed .delta { color: #e74c3c; }

  /* Chat */
  .chat-area {
    position: fixed;
    bottom: 0; left: 0;
    width: min(280px, 90vw);
    background: rgba(8,22,14,.9);
    border: 1px solid rgba(201,168,76,.15);
    border-radius: 0 12px 0 0;
    z-index: 50;
  }
  .chat-toggle {
    padding: 8px 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    font-size: .8rem;
    color: rgba(245,240,232,.5);
    border-bottom: 1px solid rgba(201,168,76,.1);
  }
  .chat-toggle .unread-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold);
    display: none;
  }
  .chat-toggle .unread-dot.has-unread { display: block; }
  .chat-messages {
    max-height: 160px;
    overflow-y: auto;
    padding: 8px 10px;
    display: none;
  }
  .chat-area.open .chat-messages { display: block; }
  .chat-msg { font-size: .82rem; margin-bottom: 4px; }
  .chat-msg .chat-name { color: var(--gold-lite); font-weight: 600; }
  .chat-msg .chat-text { color: rgba(245,240,232,.8); }
  .chat-input-row {
    display: none;
    padding: 6px 8px;
    gap: 6px;
    border-top: 1px solid rgba(201,168,76,.1);
  }
  .chat-area.open .chat-input-row { display: flex; }
  .chat-input-row input {
    flex: 1;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 6px;
    color: var(--cream);
    font-family: 'Crimson Pro', serif;
    font-size: .85rem;
    padding: 5px 9px;
    outline: none;
  }
  .chat-input-row button {
    background: rgba(201,168,76,.2);
    border: 1px solid rgba(201,168,76,.3);
    border-radius: 6px;
    color: var(--gold);
    font-size: .8rem;
    padding: 5px 10px;
    cursor: pointer;
  }

  /* Phase status bar */
  .status-bar {
    text-align: center;
    padding: 8px;
    background: rgba(0,0,0,.3);
    font-size: .85rem;
    color: rgba(245,240,232,.7);
    border-top: 1px solid rgba(201,168,76,.1);
  }
  .status-bar .highlight { color: var(--gold); font-weight: 600; }

  /* Animations */
  @keyframes deal-in {
    from { transform: translateY(-30px) scale(.9); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .card { animation: deal-in .25s ease backwards; }

  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 8px rgba(201,168,76,.3); }
    50%      { box-shadow: 0 0 20px rgba(201,168,76,.7); }
  }
  .active-player { animation: pulse-glow 2s ease-in-out infinite; }

  /* Mobile tweaks */
  @media (max-width: 600px) {
    :root { --card-w: 56px; --card-h: 80px; }
    .card-rank { font-size: 1rem; }
    .card-suit  { font-size: 1.2rem; }
    .play-area  { padding: 8px; gap: 8px; }
  }
</style>
</head>
<body>

<!-- ── LOBBY ── -->
<div id="lobby-screen">
  <div class="logo">Oh Hell</div>
  <div class="logo-sub">The Classic Trick-Taking Game</div>

  <!-- Create game -->
  <div class="card-panel" id="panel-create">
    <h2>Start a Game</h2>
    <div class="field">
      <label>Your Name</label>
      <input id="create-name" type="text" placeholder="Enter your name" maxlength="20"/>
    </div>
    <button class="btn btn-gold" onclick="createRoom()">Create Room</button>
    <div class="divider">or</div>
    <div class="field">
      <label>Room Code</label>
      <input id="join-code" type="text" placeholder="e.g. AB3X" maxlength="4" style="text-transform:uppercase"/>
    </div>
    <div class="field">
      <label>Your Name</label>
      <input id="join-name" type="text" placeholder="Enter your name" maxlength="20"/>
    </div>
    <button class="btn btn-outline" onclick="joinRoom()">Join Room</button>
    <div id="lobby-error" class="error"></div>
  </div>

  <!-- Waiting room (shown after create/join) -->
  <div class="card-panel" id="panel-waiting" style="display:none">
    <h2>Waiting Room</h2>
    <div class="code-display">
      <div class="room-code" id="display-code"></div>
      <p>Share this code with your friends</p>
    </div>
    <p style="font-size:.85rem;color:rgba(245,240,232,.5);margin-bottom:10px">Players joined:</p>
    <ul class="player-list" id="player-list"></ul>
    <button class="btn btn-gold" id="start-btn" onclick="startGame()" style="display:none">Deal Cards</button>
    <p id="waiting-msg" style="font-size:.85rem;color:rgba(245,240,232,.4);text-align:center;margin-top:12px">Waiting for host to start…</p>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div id="game-screen">
  <!-- Top bar -->
  <div class="top-bar">
    <div class="game-title">Oh Hell</div>
    <div class="round-info" id="round-info"></div>
    <div class="trump-display">
      <span class="trump-label">Trump</span>
      <div id="trump-card-display"></div>
    </div>
  </div>

  <div class="play-area">
    <!-- Opponents -->
    <div class="opponents-row" id="opponents-row"></div>
    <!-- Trick area -->
    <div class="trick-area" id="trick-area"></div>
    <!-- Bidding / my hand -->
    <div class="my-area">
      <div class="my-info" id="my-info"></div>
      <div id="bid-panel-container"></div>
      <div class="hand" id="my-hand"></div>
    </div>
  </div>

  <div class="status-bar" id="status-bar"></div>
</div>

<!-- Score toggle -->
<button class="score-toggle" id="score-toggle-btn" onclick="toggleScoreboard()" style="display:none">📊 Scores</button>
<div class="scoreboard" id="scoreboard">
  <h3>Scoreboard</h3>
  <table class="score-table" id="score-table">
    <thead><tr><th>Player</th><th>Score</th><th>Bid</th><th>Won</th></tr></thead>
    <tbody id="score-tbody"></tbody>
  </table>
</div>

<!-- Chat -->
<div class="chat-area" id="chat-area">
  <div class="chat-toggle" onclick="toggleChat()">
    <span>💬 Chat</span>
    <div class="unread-dot" id="unread-dot"></div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <input id="chat-input" type="text" placeholder="Message…" maxlength="120" onkeydown="if(event.key==='Enter')sendChat()"/>
    <button onclick="sendChat()">Send</button>
  </div>
</div>

<!-- Overlays (round end / game end) -->
<div class="overlay" id="overlay" style="display:none">
  <div class="overlay-card">
    <h2 id="overlay-title"></h2>
    <ul class="round-results" id="overlay-results"></ul>
    <div id="overlay-final-scores" style="margin-bottom:16px;display:none"></div>
    <button class="btn btn-gold" id="overlay-btn" onclick="handleOverlayBtn()"></button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let socket, myId, myRoomCode, isHost = false;
let gameState = null;
let prevPhase = null;
let chatOpen = false, unreadCount = 0;
let scoreboardOpen = false;
let prevRoundBids = {}, prevRoundTricks = {};

// ── Socket setup ───────────────────────────────────────────────────────────
function initSocket() {
  const SERVER = window.location.origin;
  socket = io(SERVER);

  socket.on('connect', () => {
    // Try to reconnect if we have stored session
    const saved = JSON.parse(sessionStorage.getItem('ohHellSession') || 'null');
    if (saved) {
      socket.emit('reconnectRoom', { roomCode: saved.roomCode, playerId: saved.playerId }, (res) => {
        if (res.ok) {
          myId = saved.playerId;
          myRoomCode = saved.roomCode;
          isHost = saved.isHost;
        } else {
          sessionStorage.removeItem('ohHellSession');
        }
      });
    }
  });

  socket.on('lobby', ({ players, hostId }) => {
    isHost = (myId === hostId);
    renderLobby(players, hostId);
  });

  socket.on('gameState', (state) => {
    const wasRoundEnd = prevPhase === 'playing' && state.phase === 'roundEnd';
    const wasGameEnd  = state.phase === 'gameEnd' && prevPhase !== 'gameEnd';
    prevPhase = state.phase;
    gameState = state;
    renderGame(state);
    if (wasRoundEnd) showRoundEnd(state);
    if (wasGameEnd)  showGameEnd(state);
  });

  socket.on('chat', ({ name, message }) => {
    appendChat(name, message);
  });

  socket.on('playerDisconnected', ({ playerId }) => {
    appendChat('System', `A player disconnected. Waiting for reconnect…`);
  });
}

// ── Room actions ───────────────────────────────────────────────────────────
function createRoom() {
  const name = document.getElementById('create-name').value.trim() || 'Host';
  socket.emit('createRoom', { playerName: name }, (res) => {
    if (!res.ok) return showError(res.error);
    myId = res.playerId;
    myRoomCode = res.roomCode;
    isHost = true;
    saveSession();
    showWaiting(res.roomCode);
  });
}

function joinRoom() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const name = document.getElementById('join-name').value.trim() || 'Player';
  if (!code) return showError('Enter a room code');
  socket.emit('joinRoom', { roomCode: code, playerName: name }, (res) => {
    if (!res.ok) return showError(res.error);
    myId = res.playerId;
    myRoomCode = res.roomCode;
    isHost = false;
    saveSession();
    showWaiting(res.roomCode);
  });
}

function startGame() {
  socket.emit('startGame', {}, (res) => {
    if (!res?.ok) showError(res?.error || 'Cannot start');
  });
}

function saveSession() {
  sessionStorage.setItem('ohHellSession', JSON.stringify({ roomCode: myRoomCode, playerId: myId, isHost }));
}

// ── Lobby UI ───────────────────────────────────────────────────────────────
function showError(msg) { document.getElementById('lobby-error').textContent = msg; }

function showWaiting(code) {
  document.getElementById('panel-create').style.display = 'none';
  document.getElementById('panel-waiting').style.display = 'block';
  document.getElementById('display-code').textContent = code;
}

function renderLobby(players, hostId) {
  const list = document.getElementById('player-list');
  list.innerHTML = players.map(p => `
    <li>
      <div class="dot"></div>
      ${escHtml(p.name)}
      ${p.id === hostId ? '<span class="host-badge">Host</span>' : ''}
    </li>
  `).join('');

  const startBtn = document.getElementById('start-btn');
  const waitMsg  = document.getElementById('waiting-msg');
  if (isHost) {
    startBtn.style.display = 'block';
    startBtn.disabled = players.length < 2;
    startBtn.textContent = players.length < 2 ? 'Need at least 2 players…' : 'Deal Cards';
    waitMsg.style.display = 'none';
  }
}

// ── Switch to game view ────────────────────────────────────────────────────
function showGameView() {
  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('score-toggle-btn').style.display = 'block';
}

// ── Render game ────────────────────────────────────────────────────────────
function renderGame(state) {
  if (document.getElementById('lobby-screen').style.display !== 'none') showGameView();

  // Round info
  const numCards = state.roundSequence[state.roundIndex];
  const roundNum = state.roundIndex + 1;
  const totalRounds = state.roundSequence.length;
  document.getElementById('round-info').innerHTML =
    `Round <strong>${roundNum}</strong>/${totalRounds} &nbsp;·&nbsp; <strong>${numCards}</strong> card${numCards !== 1 ? 's' : ''}`;

  // Trump
  const td = document.getElementById('trump-card-display');
  if (state.trumpCard) {
    td.innerHTML = buildCardHTML(state.trumpCard, true /* static */);
  } else {
    td.innerHTML = '<span style="color:rgba(245,240,232,.4);font-size:.9rem">None</span>';
  }

  // Opponents
  renderOpponents(state);

  // Trick
  renderTrick(state);

  // My area
  renderMyArea(state);

  // Scoreboard
  renderScoreboard(state);

  // Status bar
  renderStatus(state);
}

function renderOpponents(state) {
  const me = state.players.find(p => p.id === myId);
  const opponents = state.players.filter(p => p.id !== myId);
  const row = document.getElementById('opponents-row');
  row.innerHTML = opponents.map(p => {
    const isActive = state.players[state.currentPlayerIndex]?.id === p.id;
    const count = state.handCounts[p.id] || 0;
    const bid = state.bids[p.id];
    const won = state.tricks[p.id] || 0;
    const score = state.scores[p.id] ?? 0;
    const miniCards = Array(count).fill('<div class="mini-card"></div>').join('');
    return `
      <div class="opponent-area ${isActive ? 'active-player' : ''}">
        <div class="opp-name">${escHtml(p.name)}</div>
        <div class="opp-stats">
          <span><div class="label">Score</div><div class="val">${score}</div></span>
          <span><div class="label">Bid</div><div class="val">${bid !== null && bid !== undefined ? bid : '—'}</div></span>
          <span><div class="label">Won</div><div class="val">${won}</div></span>
        </div>
        <div class="opp-cards">${miniCards}</div>
      </div>
    `;
  }).join('');
}

function renderTrick(state) {
  const area = document.getElementById('trick-area');
  if (state.currentTrick.length === 0) {
    area.innerHTML = `<div style="color:rgba(245,240,232,.2);font-style:italic;font-size:.9rem">No cards played yet</div>`;
    return;
  }
  area.innerHTML = state.currentTrick.map(({ playerId, card }) => {
    const pName = state.players.find(p => p.id === playerId)?.name || '';
    return `
      <div class="trick-slot">
        <div class="trick-player-name">${escHtml(pName)}</div>
        ${buildCardHTML(card, true)}
      </div>
    `;
  }).join('');
}

function renderMyArea(state) {
  const myInfo = document.getElementById('my-info');
  const myName = state.players.find(p => p.id === myId)?.name || '';
  const myBid  = state.bids[myId];
  const myWon  = state.tricks[myId] || 0;
  const myScore = state.scores[myId] ?? 0;
  myInfo.innerHTML = `
    <div class="my-name">${escHtml(myName)}</div>
    <div class="my-stat"><div class="stat-label">Score</div><div class="stat-val">${myScore}</div></div>
    <div class="my-stat"><div class="stat-label">Bid</div><div class="stat-val">${myBid !== null && myBid !== undefined ? myBid : '—'}</div></div>
    <div class="my-stat"><div class="stat-label">Won</div><div class="stat-val">${myWon}</div></div>
  `;

  // Bid panel
  const bidContainer = document.getElementById('bid-panel-container');
  const isMyTurn = state.players[state.currentPlayerIndex]?.id === myId;
  if (state.phase === 'bidding' && isMyTurn && (state.bids[myId] === null || state.bids[myId] === undefined)) {
    const numCards = state.roundSequence[state.roundIndex];
    const isLast = state.currentPlayerIndex === state.dealerIndex;
    const forbidden = isLast ? calcForbidden(state) : -1;
    const btns = Array.from({ length: numCards + 1 }, (_, i) => `
      <button class="bid-btn" onclick="placeBid(${i})" ${i === forbidden ? 'disabled title="Hook rule"' : ''}>${i}</button>
    `).join('');
    const hookNote = isLast ? `<p>Hook rule: cannot bid <strong>${forbidden}</strong></p>` : '<p>Choose your bid</p>';
    bidContainer.innerHTML = `
      <div class="bid-panel">
        <h3>Place Your Bid</h3>
        ${hookNote}
        <div class="bid-buttons">${btns}</div>
      </div>
    `;
  } else {
    bidContainer.innerHTML = '';
  }

  // Hand
  const handDiv = document.getElementById('my-hand');
  const isMyPlayTurn = state.phase === 'playing' && isMyTurn;
  const leadSuit = state.currentTrick.length > 0 ? state.currentTrick[0].card.suit : null;
  const legal = isMyPlayTurn ? legalCards(state.hand, leadSuit) : [];

  handDiv.innerHTML = state.hand.map((card, i) => {
    const cid = cardId(card);
    const isLegal = legal.some(c => cardId(c) === cid);
    const canPlay = isMyPlayTurn && isLegal;
    const cls = canPlay ? 'playable' : (!isMyPlayTurn ? '' : 'disabled');
    const onclick = canPlay ? `playCard('${cid}')` : '';
    return buildCardHTML(card, !canPlay, onclick, cls, i * 30);
  }).join('');
}

function renderStatus(state) {
  const bar = document.getElementById('status-bar');
  const currentPlayer = state.players[state.currentPlayerIndex];
  const isMyTurn = currentPlayer?.id === myId;
  let msg = '';
  if (state.phase === 'bidding') {
    msg = isMyTurn
      ? `<span class="highlight">Your turn to bid!</span>`
      : `Waiting for <span class="highlight">${escHtml(currentPlayer?.name)}</span> to bid…`;
  } else if (state.phase === 'playing') {
    msg = isMyTurn
      ? `<span class="highlight">Your turn to play a card!</span>`
      : `Waiting for <span class="highlight">${escHtml(currentPlayer?.name)}</span> to play…`;
  } else if (state.phase === 'roundEnd') {
    msg = 'Round complete!';
  } else if (state.phase === 'gameEnd') {
    msg = '🎉 Game over!';
  }
  bar.innerHTML = msg;
}

function renderScoreboard(state) {
  const tbody = document.getElementById('score-tbody');
  const sorted = [...state.players].sort((a, b) => (state.scores[b.id] || 0) - (state.scores[a.id] || 0));
  tbody.innerHTML = sorted.map(p => `
    <tr>
      <td>${escHtml(p.name)}${p.id === myId ? ' <small style="color:var(--gold)">(you)</small>' : ''}</td>
      <td>${state.scores[p.id] ?? 0}</td>
      <td>${state.bids[p.id] !== null && state.bids[p.id] !== undefined ? state.bids[p.id] : '—'}</td>
      <td>${state.tricks[p.id] || 0}</td>
    </tr>
  `).join('');
}

// ── Round / Game end overlays ──────────────────────────────────────────────
function showRoundEnd(state) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlay-title');
  const results = document.getElementById('overlay-results');
  const btn = document.getElementById('overlay-btn');
  const finalDiv = document.getElementById('overlay-final-scores');
  finalDiv.style.display = 'none';

  title.textContent = `Round ${state.roundIndex} Complete`;
  results.innerHTML = state.players.map(p => {
    const bid = state.bids[p.id] ?? 0;
    const won = state.tricks[p.id] ?? 0;
    const made = bid === won;
    const delta = made ? 10 + won : -Math.abs(bid - won);
    return `
      <li class="${made ? 'made' : 'missed'}">
        <span>${escHtml(p.name)}: bid ${bid}, got ${won}</span>
        <span class="delta">${delta >= 0 ? '+' : ''}${delta}</span>
      </li>
    `;
  }).join('');

  btn.textContent = isHost ? 'Next Round' : 'Waiting for host…';
  btn.disabled = !isHost;
  overlay.style.display = 'flex';
}

function showGameEnd(state) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlay-title');
  const results = document.getElementById('overlay-results');
  const btn = document.getElementById('overlay-btn');
  const finalDiv = document.getElementById('overlay-final-scores');

  const sorted = [...state.players].sort((a, b) => (state.scores[b.id] || 0) - (state.scores[a.id] || 0));
  const winner = sorted[0];
  title.textContent = `🏆 ${escHtml(winner.name)} Wins!`;
  results.innerHTML = sorted.map((p, i) => `
    <li class="${i === 0 ? 'made' : 'missed'}">
      <span>${i + 1}. ${escHtml(p.name)}</span>
      <span class="delta">${state.scores[p.id] ?? 0} pts</span>
    </li>
  `).join('');
  finalDiv.style.display = 'none';
  btn.textContent = 'Thanks for playing!';
  btn.disabled = false;
  btn.onclick = () => { overlay.style.display = 'none'; };
  overlay.style.display = 'flex';
}

function handleOverlayBtn() {
  if (!isHost) return;
  const state = gameState;
  if (state?.phase === 'gameEnd') return;
  socket.emit('nextRound', {}, (res) => {
    if (res?.ok) document.getElementById('overlay').style.display = 'none';
  });
}

// ── Game actions ───────────────────────────────────────────────────────────
function placeBid(bid) {
  socket.emit('placeBid', { bid }, (res) => {
    if (!res?.ok) showGameError(res?.error);
  });
}

function playCard(cid) {
  socket.emit('playCard', { cardId: cid }, (res) => {
    if (!res?.ok) showGameError(res?.error);
  });
}

function showGameError(msg) {
  if (!msg) return;
  const bar = document.getElementById('status-bar');
  const prev = bar.innerHTML;
  bar.innerHTML = `<span style="color:#e74c3c">${escHtml(msg)}</span>`;
  setTimeout(() => { bar.innerHTML = prev; }, 2500);
}

// ── Card helpers ───────────────────────────────────────────────────────────
function cardId(card) { return `${card.rank}${card.suit}`; }

const RED_SUITS = new Set(['♥', '♦']);

function buildCardHTML(card, isStatic = false, onclick = '', extraClass = '', animDelay = 0) {
  const color = RED_SUITS.has(card.suit) ? 'red' : 'black';
  const cid = cardId(card);
  const onclickAttr = onclick ? `onclick="${onclick}"` : '';
  const staticClass = isStatic ? 'static' : '';
  const style = animDelay ? `animation-delay:${animDelay}ms` : '';
  return `
    <div class="card ${color} ${extraClass} ${staticClass}" ${onclickAttr} style="${style}" title="${cid}">
      <div class="card-corner">${card.rank}<br>${card.suit}</div>
      <div class="card-rank">${card.rank}</div>
      <div class="card-suit">${card.suit}</div>
      <div class="card-corner-br">${card.rank}<br>${card.suit}</div>
    </div>
  `;
}

function legalCards(hand, leadSuit) {
  if (!leadSuit) return hand;
  const suited = hand.filter(c => c.suit === leadSuit);
  return suited.length > 0 ? suited : hand;
}

function calcForbidden(state) {
  const numCards = state.roundSequence[state.roundIndex];
  const bidSoFar = Object.values(state.bids).reduce((s, b) => s + (b ?? 0), 0);
  return numCards - bidSoFar;
}

// ── Chat ───────────────────────────────────────────────────────────────────
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-area').classList.toggle('open', chatOpen);
  if (chatOpen) {
    unreadCount = 0;
    document.getElementById('unread-dot').classList.remove('has-unread');
  }
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  socket.emit('chat', { message: msg });
  input.value = '';
}

function appendChat(name, message) {
  const div = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'chat-msg';
  el.innerHTML = `<span class="chat-name">${escHtml(name)}: </span><span class="chat-text">${escHtml(message)}</span>`;
  div.appendChild(el);
  div.scrollTop = div.scrollHeight;
  if (!chatOpen) {
    unreadCount++;
    document.getElementById('unread-dot').classList.add('has-unread');
  }
}

// ── Scoreboard ─────────────────────────────────────────────────────────────
function toggleScoreboard() {
  scoreboardOpen = !scoreboardOpen;
  document.getElementById('scoreboard').classList.toggle('open', scoreboardOpen);
}

// ── Util ───────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
initSocket();
</script>
</body>
</html>
